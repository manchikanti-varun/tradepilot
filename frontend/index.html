<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradePilot AI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0e14; --card: #141b27; --card2: #1a2435;
            --border: #243044; --text: #e8edf4; --muted: #7a8fa6;
            --green: #00d4aa; --red: #ff4757; --amber: #ffb347;
            --blue: #4da6ff; --purple: #a78bfa; --cyan: #22d3ee;
            --gradient1: linear-gradient(135deg, #1a2435 0%, #0d1b2a 100%);
            --gradient-green: linear-gradient(135deg, #064e3b, #022c22);
            --gradient-red: linear-gradient(135deg, #450a0a, #1c0404);
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text);
            line-height: 1.6; min-height: 100vh;
        }
        .container { max-width: 480px; margin: 0 auto; padding: 0.75rem; padding-bottom: 5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0 0.5rem; }
        .header h1 { font-size: 1.3rem; font-weight: 800; }
        .header h1 span { color: var(--blue); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; margin-bottom: 0.75rem; }
        .card-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.75rem; font-weight: 600; }
        .growth-card { background: linear-gradient(135deg, #0d253f, #1a365d); border: 1px solid rgba(77,166,255,0.3); cursor: pointer; }
        .growth-amount { font-size: 2rem; font-weight: 800; }
        .growth-tier { display: inline-block; background: rgba(77,166,255,0.15); color: var(--blue); padding: 0.15rem 0.5rem; border-radius: 6px; font-size: 0.7rem; font-weight: 700; margin-top: 0.3rem; }
        .progress-track { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; margin-top: 1rem; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--cyan)); border-radius: 2px; transition: width 0.5s; }
        .progress-label { display: flex; justify-content: space-between; margin-top: 0.3rem; font-size: 0.7rem; color: var(--muted); }
        .intake-wrap { position: sticky; top: 0; z-index: 100; background: var(--bg); padding: 0.5rem 0; }
        .intake-bar { display: flex; gap: 0.4rem; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 0.4rem; }
        .intake-bar input { flex: 1; background: transparent; border: none; padding: 0.6rem 0.75rem; color: var(--text); font-size: 0.9rem; outline: none; }
        .intake-bar input::placeholder { color: var(--muted); }
        .intake-bar button { background: var(--blue); color: #fff; border: none; border-radius: 10px; padding: 0.6rem 1.1rem; font-weight: 800; font-size: 1rem; cursor: pointer; }
        .banner { padding: 0.7rem 1rem; border-radius: 12px; margin-bottom: 0.75rem; font-size: 0.82rem; font-weight: 500; display: none; }
        .banner.show { display: block; }
        .banner-red { background: rgba(255,71,87,0.08); border: 1px solid rgba(255,71,87,0.25); color: var(--red); }
        .banner-amber { background: rgba(255,179,71,0.08); border: 1px solid rgba(255,179,71,0.25); color: var(--amber); }
        .brief-card { border-color: rgba(167,139,250,0.3); }
        .brief-text { font-size: 0.88rem; }
        .signal-card { border-left: 3px solid var(--green); padding-left: 1rem; }
        .signal-ticker { font-size: 1.4rem; font-weight: 800; }
        .signal-meta { color: var(--muted); font-size: 0.78rem; margin-top: 0.3rem; }
        .signal-charges { display: flex; gap: 0.5rem; margin-top: 0.6rem; flex-wrap: wrap; }
        .signal-charges .chip { background: var(--card2); padding: 0.25rem 0.5rem; border-radius: 6px; font-size: 0.72rem; color: var(--muted); }
        .signal-charges .chip strong { color: var(--text); }
        .signal-cta { margin-top: 0.75rem; padding: 0.6rem 1.2rem; background: linear-gradient(135deg, #059669, #047857); color: #fff; border: none; border-radius: 10px; font-weight: 700; font-size: 0.82rem; display: inline-block; }
        .position-card { border-color: var(--green); background: linear-gradient(135deg, #0a0e14, rgba(0,212,170,0.05)); }
        .position-card.exit-now { border-color: var(--red); background: linear-gradient(135deg, #0a0e14, rgba(255,71,87,0.05)); }
        .pnl-big { font-size: 1.6rem; font-weight: 800; }
        .pnl-positive { color: var(--green); }
        .pnl-negative { color: var(--red); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
        .stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem; text-align: center; }
        .stat-box .value { font-size: 1.1rem; font-weight: 700; }
        .stat-box .label { font-size: 0.65rem; color: var(--muted); margin-top: 0.15rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .tabs { display: flex; background: var(--card); border-radius: 12px; padding: 0.3rem; margin-bottom: 0.75rem; border: 1px solid var(--border); }
        .tab { flex: 1; text-align: center; padding: 0.5rem; border-radius: 9px; font-size: 0.78rem; font-weight: 600; color: var(--muted); cursor: pointer; transition: all 0.2s; }
        .tab.active { background: var(--blue); color: #fff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .trade-row { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid var(--border); }
        .trade-row:last-child { border-bottom: none; }
        .trade-info .ticker { font-weight: 700; font-size: 0.88rem; }
        .trade-info .date { font-size: 0.72rem; color: var(--muted); }
        .trade-pnl { font-weight: 700; font-size: 0.85rem; }
        .capital-panel { display: none; }
        .capital-panel.show { display: block; }
        .capital-panel input[type=number] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 0.7rem 1rem; color: var(--text); font-size: 1rem; margin-bottom: 0.5rem; outline: none; }
        .capital-panel .btn-row { display: flex; gap: 0.5rem; }
        .capital-panel .btn-row button { flex: 1; padding: 0.6rem; border: none; border-radius: 10px; font-weight: 700; font-size: 0.85rem; cursor: pointer; }
        .empty-state { text-align: center; padding: 1.5rem; color: var(--muted); }
        .empty-state .icon { font-size: 1.8rem; margin-bottom: 0.4rem; }
        #toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); padding: 1rem 1.25rem; border-radius: 14px; display: none; z-index: 999; max-width: 360px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
</style>
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>TradePilot <span>AI</span></h1>
        <div style="display:flex;align-items:center;gap:0.5rem">
            <span class="status-dot"></span>
            <span style="font-size:0.75rem;color:var(--muted)" id="status-text">Live</span>
        </div>
    </div>
    <div class="intake-wrap">
        <div class="intake-bar">
            <input type="text" id="intake-input" placeholder="Bought SBIN at 845, qty 4...">
            <button onclick="submitIntake()">→</button>
        </div>
    </div>
    <div id="risk-banner" class="banner banner-red"></div>
    <div id="brief-card" class="card brief-card" style="display:none">
        <div class="card-title">☀️ Morning Brief</div>
        <div id="brief-content" class="brief-text"></div>
    </div>
    <div class="card growth-card" onclick="toggleCapital()">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
                <div class="growth-amount" id="capital-amount">₹1,000</div>
                <div class="growth-tier" id="capital-tier">TIER A</div>
            </div>
            <div style="text-align:right;font-size:0.8rem;color:var(--muted)">
                <div id="capital-progress">0% to next</div>
                <div style="font-size:0.7rem;margin-top:0.2rem">tap to edit</div>
            </div>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        <div class="progress-label"><span id="tier-start">₹1,000</span><span id="tier-end">₹2,000</span></div>
    </div>
    <div id="capital-panel" class="capital-panel card">
        <div class="card-title">💰 Update Capital</div>
        <input type="number" id="capital-input" placeholder="Enter amount (1000-20000)" min="1000" max="20000" step="100">
        <div class="btn-row">
            <button onclick="saveCapital()" style="background:var(--blue);color:#fff">Save</button>
            <button onclick="toggleCapital()" style="background:var(--border);color:var(--muted)">Cancel</button>
        </div>
    </div>
    <div id="position-section" style="display:none">
        <div class="card position-card" id="position-card">
            <div class="card-title">📊 Active Position</div>
            <div id="position-content"></div>
        </div>
    </div>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('signals')">Signals</div>
        <div class="tab" onclick="switchTab('history')">History</div>
        <div class="tab" onclick="switchTab('stats')">Stats</div>
    </div>
    <div id="tab-signals" class="tab-content active">
        <div class="card"><div class="card-title">🎯 Priority #1</div><div id="signals-content"><div class="empty-state"><div class="icon">📡</div><div>Scanning market...</div></div></div></div>
        <div id="rejections-banner" class="banner banner-amber"></div>
    </div>
    <div id="tab-history" class="tab-content">
        <div class="card"><div class="card-title">📜 Recent Trades</div><div id="history-content"><div class="empty-state"><div class="icon">📝</div><div>No trades yet</div></div></div></div>
    </div>
    <div id="tab-stats" class="tab-content">
        <div class="stats-grid">
            <div class="stat-box"><div class="value" id="stat-trades">0</div><div class="label">Trades</div></div>
            <div class="stat-box"><div class="value" id="stat-winrate">—</div><div class="label">Win Rate</div></div>
            <div class="stat-box"><div class="value" id="stat-pnl">₹0</div><div class="label">Net P&L</div></div>
            <div class="stat-box"><div class="value" id="stat-charges">—</div><div class="label">Charge Drag</div></div>
        </div>
    </div>
</div>
<div id="toast"></div>
<script>
const API='';
function switchTab(t){document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));document.getElementById('tab-'+t).classList.add('active');event.target.classList.add('active');if(t==='history')loadHistory();}
function toggleCapital(){const p=document.getElementById('capital-panel');p.classList.toggle('show');}
async function saveCapital(){const v=parseFloat(document.getElementById('capital-input').value);if(!v||v<1000||v>20000){showToast('Enter ₹1,000-₹20,000','error');return;}try{const r=await fetch(API+'/api/capital',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({capital:v})});if(r.ok){showToast('Capital updated to ₹'+v.toLocaleString(),'success');toggleCapital();fetchState();}else{const d=await r.json();showToast(d.detail||'Failed','error');}}catch(e){showToast('Network error','error');}}
async function fetchState(){try{const[state,growth,pos,sig,rej,perf]=await Promise.all([fetch(API+'/api/state').then(r=>r.json()),fetch(API+'/api/growth').then(r=>r.json()),fetch(API+'/api/position').then(r=>r.json()),fetch(API+'/api/signals').then(r=>r.json()),fetch(API+'/api/rejections/today').then(r=>r.json()),fetch(API+'/api/performance').then(r=>r.json())]);updateGrowth(growth);updateRisk(state);updatePosition(pos);updateSignals(sig);updateRejections(rej);updateStats(perf);}catch(e){document.getElementById('status-text').textContent='Offline';}}
function updateGrowth(g){document.getElementById('capital-amount').textContent='₹'+g.current_capital.toLocaleString();document.getElementById('capital-tier').textContent='TIER '+g.current_tier;document.getElementById('capital-progress').textContent=g.progress_pct_to_next_tier.toFixed(0)+'% to next';document.getElementById('progress-fill').style.width=g.progress_pct_to_next_tier+'%';const thresholds={A:[1000,2000],B:[2000,5000],C:[5000,10000],D:[10000,20000]};const t=thresholds[g.current_tier]||[1000,2000];document.getElementById('tier-start').textContent='₹'+t[0].toLocaleString();document.getElementById('tier-end').textContent='₹'+t[1].toLocaleString();}
function updateRisk(s){const b=document.getElementById('risk-banner');if(s.risk_gate==='HARD_STOP'){b.textContent='🛑 '+s.risk_reason;b.className='banner banner-red show';}else if(s.risk_gate==='CAUTION'){b.textContent='⚠️ '+s.risk_reason;b.className='banner banner-amber show';}else{b.className='banner banner-red';}}
function updatePosition(p){const sec=document.getElementById('position-section');if(!p.active){sec.style.display='none';return;}sec.style.display='block';const d=p.position;const col=d.net_pnl>=0?'var(--green)':'var(--red)';const card=document.getElementById('position-card');card.className=p.exit_signal&&p.exit_signal.should_exit?'card position-card exit-now':'card position-card';let exit='';if(p.exit_signal&&p.exit_signal.should_exit)exit='<div style="margin-top:0.75rem;padding:0.6rem;background:rgba(255,71,87,0.1);border-radius:8px;color:var(--red);font-weight:600">'+p.exit_signal.urgency+': '+p.exit_signal.reason+'</div>';document.getElementById('position-content').innerHTML='<div style="display:flex;justify-content:space-between;align-items:baseline"><span style="font-size:1.3rem;font-weight:800">'+d.ticker+'</span><span class="pnl-big '+(d.net_pnl>=0?'pnl-positive':'pnl-negative')+'">'+(d.net_pnl>=0?'+':'')+'₹'+d.net_pnl.toFixed(2)+'</span></div><div style="color:var(--muted);font-size:0.8rem;margin-top:0.4rem">Qty '+d.qty+' @ ₹'+d.entry_price+' → ₹'+d.current_ltp+' | '+d.phase+'</div><div style="color:var(--muted);font-size:0.8rem">Stop ₹'+d.stop_price+' | Charges ~₹'+d.charges_estimate+'</div>'+exit;}
function updateSignals(data){const el=document.getElementById('signals-content');if(!data.signals.length){el.innerHTML='<div class="empty-state"><div class="icon">📡</div><div>No signals now. Scanning...</div></div>';return;}const s=data.signals[0];el.innerHTML='<div class="signal-card"><div style="display:flex;justify-content:space-between;align-items:baseline"><span class="signal-ticker">'+s.symbol+'</span><span style="background:rgba(0,212,170,0.15);color:var(--green);padding:0.2rem 0.5rem;border-radius:5px;font-size:0.75rem;font-weight:700">'+s.grade+'</span></div><div class="signal-meta">'+s.sector+' • Score '+s.composite+' • R:R '+s.risk_reward+'</div><div class="signal-charges"><div class="chip">Net <strong>₹'+s.net_after_charges.toFixed(2)+'</strong></div><div class="chip">Break-even <strong>'+s.breakeven_pct+'%</strong></div></div><div style="margin-top:0.75rem;font-weight:700;font-size:0.9rem">'+s.message+'</div><div class="signal-cta">Buy in Angel One</div></div>';}
function updateRejections(d){const el=document.getElementById('rejections-banner');if(d.total_rejected>0){el.textContent='📋 '+d.headline;el.className='banner banner-amber show';}else{el.className='banner banner-amber';}}
function updateStats(p){document.getElementById('stat-trades').textContent=p.total_trades||0;document.getElementById('stat-winrate').textContent=p.win_rate?p.win_rate+'%':'—';document.getElementById('stat-pnl').textContent=p.net_pnl!==undefined?'₹'+p.net_pnl:'—';document.getElementById('stat-charges').textContent=p.charge_drag_pct?p.charge_drag_pct+'%':'—';}
async function loadHistory(){try{const r=await fetch(API+'/api/history?limit=20');const d=await r.json();const el=document.getElementById('history-content');if(!d.trades.length){el.innerHTML='<div class="empty-state"><div class="icon">📝</div><div>No trades yet</div></div>';return;}el.innerHTML=d.trades.map(t=>'<div class="trade-row"><div class="trade-info"><div class="ticker">'+t.ticker+'</div><div class="date">'+(t.entry_time||'').slice(0,10)+' • Qty '+t.qty+'</div></div><div class="trade-pnl" style="color:'+(t.exit_price&&t.exit_price>t.entry_price?'var(--green)':'var(--red)')+'">₹'+t.entry_price+' → '+(t.exit_price||'open')+'</div></div>').join('');}catch(e){}}
async function submitIntake(){const input=document.getElementById('intake-input');const text=input.value.trim();if(!text)return;try{const r=await fetch(API+'/api/intake',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});const d=await r.json();if(d.status==='confirm_entry'||d.status==='confirm_exit'){showToast(d.message,'confirm',d.parsed);}else if(d.status==='clarification_needed'){showToast(d.message,'warn');}else{showToast(d.message,'error');}input.value='';}catch(e){showToast('Network error','error');}}
async function confirmIntake(p){try{const r=await fetch(API+'/api/intake/confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});const d=await r.json();showToast(d.message,d.status.includes('error')?'error':'success');setTimeout(fetchState,1000);}catch(e){showToast('Failed','error');}}
function showToast(msg,type,parsed){const t=document.getElementById('toast');let border='var(--border)';if(type==='success')border='var(--green)';else if(type==='error')border='var(--red)';else if(type==='warn')border='var(--amber)';else if(type==='confirm')border='var(--blue)';let html='<div style="margin-bottom:0.5rem;font-size:0.9rem">'+msg+'</div>';if(type==='confirm'&&parsed){html+='<div style="display:flex;gap:0.5rem"><button onclick="confirmIntake('+JSON.stringify(parsed).replace(/"/g,'&quot;')+')" style="flex:1;background:var(--green);color:#fff;border:none;padding:0.5rem;border-radius:8px;font-weight:700;cursor:pointer">✓ Confirm</button><button onclick="hideToast()" style="flex:1;background:var(--border);color:var(--text);border:none;padding:0.5rem;border-radius:8px;cursor:pointer">✕ Cancel</button></div>';}t.innerHTML=html;t.style.display='block';t.style.borderColor=border;if(type!=='confirm')setTimeout(hideToast,4000);}
function hideToast(){document.getElementById('toast').style.display='none';}
document.getElementById('intake-input').addEventListener('keypress',e=>{if(e.key==='Enter')submitIntake();});
async function loadBrief(){try{const r=await fetch(API+'/api/brief/today');const b=await r.json();const c=document.getElementById('brief-card');document.getElementById('brief-content').innerHTML=b.one_line_summary;c.style.display='block';}catch(e){}}
fetchState();loadBrief();
let timer=setInterval(fetchState,30000);
setInterval(()=>{const d=new Date();const h=d.getHours();const day=d.getDay();clearInterval(timer);timer=setInterval(fetchState,(day>=1&&day<=5&&h>=9&&h<16)?30000:300000);},300000);
</script>
</body>
</html>
